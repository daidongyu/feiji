<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="mobile-web-app-capable" content="yes">
    <title>翠翠养成记 - 传奇人生</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        html {
            height: 100%;
            overflow-x: hidden;
        }
        
        body {
            font-family: 'Microsoft YaHei', Arial, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            min-height: 100vh;
            min-height: -webkit-fill-available;
            color: #fff;
            overflow-x: hidden;
            -webkit-overflow-scrolling: touch;
        }
        
        .game-container {
            max-width: 800px;
            margin: 0 auto;
            padding: 15px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }
        
        @media (max-width: 480px) {
            .game-container {
                padding: 10px;
            }
        }
        
        /* 标题区 */
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 28px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d, #6bcf7f);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 30px rgba(255, 107, 107, 0.5);
            margin-bottom: 10px;
        }
        
        @media (max-width: 480px) {
            .header h1 {
                font-size: 22px;
            }
        }
        
        .age-display {
            font-size: 20px;
            color: #ffd93d;
        }
        
        /* 角色信息卡片 */
        .character-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 15px;
            display: flex;
            gap: 15px;
            align-items: center;
            margin-bottom: 15px;
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        @media (max-width: 480px) {
            .character-card {
                flex-direction: column;
                text-align: center;
                padding: 12px;
                gap: 10px;
            }
        }
        
        .avatar-container {
            position: relative;
        }
        
        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 4px solid #ff6b6b;
            object-fit: cover;
            box-shadow: 0 0 20px rgba(255, 107, 107, 0.5);
            flex-shrink: 0;
        }
        
        @media (max-width: 480px) {
            .avatar {
                width: 80px;
                height: 80px;
            }
        }
        
        .status-badge {
            position: absolute;
            bottom: 0;
            right: 0;
            background: #e74c3c;
            color: white;
            padding: 4px 10px;
            border-radius: 15px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .character-info {
            flex: 1;
        }
        
        .character-name {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .character-title {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 10px;
        }
        
        @media (max-width: 480px) {
            .character-name {
                font-size: 18px;
            }
            .character-title {
                font-size: 12px;
            }
        }
        
        /* 属性条 */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
        }
        
        @media (max-width: 480px) {
            .stats-grid {
                gap: 6px;
            }
        }
        
        .stat-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }
        
        .stat-icon {
            font-size: 16px;
        }
        
        .stat-bar {
            flex: 1;
            height: 6px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 3px;
            overflow: hidden;
            min-width: 40px;
        }
        
        @media (max-width: 480px) {
            .stat-icon {
                font-size: 14px;
            }
            .stat-bar {
                height: 5px;
            }
        }
        
        .stat-fill {
            height: 100%;
            border-radius: 4px;
            transition: width 0.5s ease;
        }
        
        .stat-fill.int { background: linear-gradient(90deg, #3498db, #5dade2); }
        .stat-fill.str { background: linear-gradient(90deg, #e74c3c, #ec7063); }
        .stat-fill.money { background: linear-gradient(90deg, #f1c40f, #f4d03f); }
        .stat-fill.moral { background: linear-gradient(90deg, #9b59b6, #bb8fce); }
        .stat-fill.code { background: linear-gradient(90deg, #1abc9c, #48c9b0); }
        .stat-fill.luck { background: linear-gradient(90deg, #e67e22, #eb984e); }
        
        .stat-value {
            font-size: 11px;
            width: 28px;
            text-align: right;
        }
        
        /* 主游戏区 */
        .main-area {
            background: rgba(255, 255, 255, 0.05);
            border-radius: 20px;
            padding: 15px;
            min-height: 250px;
            margin-bottom: 15px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        @media (max-width: 480px) {
            .main-area {
                padding: 12px;
                min-height: 200px;
            }
        }
        
        .story-text {
            font-size: 15px;
            line-height: 1.7;
            margin-bottom: 15px;
            padding: 12px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 10px;
            border-left: 4px solid #ff6b6b;
        }
        
        @media (max-width: 480px) {
            .story-text {
                font-size: 14px;
                line-height: 1.6;
                padding: 10px;
            }
        }
        
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }
        
        .choice-btn {
            padding: 16px 18px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.2s;
            text-align: left;
            position: relative;
            overflow: hidden;
            min-height: 52px;
            -webkit-touch-callout: none;
            user-select: none;
        }
        
        @media (max-width: 480px) {
            .choice-btn {
                padding: 14px 15px;
                font-size: 14px;
                min-height: 48px;
            }
        }
        
        .choice-btn:hover {
            transform: translateX(5px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }
        
        .choice-btn:active {
            transform: scale(0.98);
            opacity: 0.9;
        }
        
        .choice-btn::before {
            content: '▶';
            margin-right: 10px;
            opacity: 0;
            transition: opacity 0.3s;
        }
        
        .choice-btn:hover::before,
        .choice-btn:active::before {
            opacity: 1;
        }
        
        .choice-btn.negative {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
        }
        
        .choice-btn.positive {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
        }
        
        /* 事件日志 */
        .event-log {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 15px;
            max-height: 200px;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
        }
        
        @media (max-width: 480px) {
            .event-log {
                max-height: 150px;
                padding: 12px;
            }
        }
        
        .event-log h3 {
            font-size: 14px;
            color: #aaa;
            margin-bottom: 10px;
        }
        
        .log-item {
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            font-size: 13px;
            display: flex;
            gap: 10px;
        }
        
        @media (max-width: 480px) {
            .log-item {
                font-size: 12px;
                gap: 8px;
            }
        }
        
        .log-time {
            color: #888;
            white-space: nowrap;
            flex-shrink: 0;
        }
        
        .log-content {
            color: #ddd;
            word-break: break-word;
        }
        
        .log-content.good { color: #2ecc71; }
        .log-content.bad { color: #e74c3c; }
        .log-content.money { color: #f1c40f; }
        
        /* 开始/结束界面 */
        .screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            height: -webkit-fill-available;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 20px;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
            overflow-y: auto;
        }
        
        .screen.hidden {
            display: none;
        }
        
        .start-title {
            font-size: 42px;
            background: linear-gradient(90deg, #ff6b6b, #ffd93d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            text-align: center;
        }
        
        @media (max-width: 480px) {
            .start-title {
                font-size: 32px;
            }
        }
        
        .start-subtitle {
            font-size: 16px;
            color: #aaa;
            margin-bottom: 30px;
            text-align: center;
            line-height: 1.6;
        }
        
        @media (max-width: 480px) {
            .start-subtitle {
                font-size: 14px;
                margin-bottom: 20px;
            }
        }
        
        .start-avatar {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 5px solid #ff6b6b;
            margin-bottom: 25px;
            box-shadow: 0 0 40px rgba(255, 107, 107, 0.6);
        }
        
        @media (max-width: 480px) {
            .start-avatar {
                width: 100px;
                height: 100px;
                margin-bottom: 20px;
            }
        }
        
        .start-btn {
            padding: 18px 50px;
            font-size: 22px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 50px;
            color: white;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
            min-height: 60px;
            -webkit-touch-callout: none;
            user-select: none;
        }
        
        .start-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 0 30px rgba(102, 126, 234, 0.6);
        }
        
        .start-btn:active {
            transform: scale(0.98);
        }
        
        @media (max-width: 480px) {
            .start-btn {
                padding: 16px 40px;
                font-size: 20px;
                min-height: 54px;
            }
        }
        
        /* 结局界面 */
        .ending-card {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            padding: 25px;
            max-width: 500px;
            width: 100%;
            text-align: center;
            max-height: 85vh;
            overflow-y: auto;
        }
        
        @media (max-width: 480px) {
            .ending-card {
                padding: 20px 15px;
            }
        }
        
        .ending-title {
            font-size: 32px;
            margin-bottom: 15px;
        }
        
        @media (max-width: 480px) {
            .ending-title {
                font-size: 26px;
            }
        }
        
        .ending-title.good {
            background: linear-gradient(90deg, #2ecc71, #27ae60);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .ending-title.bad {
            background: linear-gradient(90deg, #e74c3c, #c0392b);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .ending-title.neutral {
            background: linear-gradient(90deg, #95a5a6, #7f8c8d);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .ending-summary {
            font-size: 15px;
            line-height: 1.7;
            color: #ddd;
            margin-bottom: 15px;
        }
        
        @media (max-width: 480px) {
            .ending-summary {
                font-size: 13px;
            }
        }
        
        .final-stats {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 15px;
            padding: 20px;
            margin-bottom: 20px;
        }
        
        .final-stat-item {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        .achievement-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .achievement {
            background: linear-gradient(135deg, #f093fb 0%, #f5576c 100%);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 12px;
            word-break: keep-all;
        }
        
        @media (max-width: 480px) {
            .achievement {
                padding: 6px 12px;
                font-size: 11px;
            }
        }
        
        /* 滚动条美化 */
        ::-webkit-scrollbar {
            width: 6px;
        }
        
        ::-webkit-scrollbar-track {
            background: rgba(0, 0, 0, 0.2);
        }
        
        ::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.3);
            border-radius: 3px;
        }
        
        /* 成就弹窗 */
        .achievement-popup {
            position: fixed;
            top: 20px;
            right: 20px;
            left: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            padding: 15px 20px;
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
            transform: translateY(-150px);
            transition: transform 0.5s ease;
            z-index: 100;
            text-align: center;
            max-width: 400px;
            margin: 0 auto;
        }
        
        .achievement-popup.show {
            transform: translateY(0);
        }
        
        @media (min-width: 480px) {
            .achievement-popup {
                left: auto;
                width: auto;
                transform: translateX(400px);
            }
            .achievement-popup.show {
                transform: translateX(0);
            }
        }
        
        .achievement-popup.show {
            transform: translateX(0);
        }
        
        .achievement-popup-title {
            font-size: 12px;
            opacity: 0.8;
            margin-bottom: 5px;
        }
        
        .achievement-popup-name {
            font-size: 16px;
            font-weight: bold;
        }
        
        /* NPC对话框 */
        .npc-dialog {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 15px;
            padding: 12px;
            margin-bottom: 12px;
            display: flex;
            gap: 12px;
            align-items: flex-start;
        }
        
        @media (max-width: 480px) {
            .npc-dialog {
                padding: 10px;
                gap: 10px;
            }
        }
        
        .npc-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 22px;
            flex-shrink: 0;
        }
        
        @media (max-width: 480px) {
            .npc-avatar {
                width: 40px;
                height: 40px;
                font-size: 20px;
            }
        }
        
        .npc-content {
            flex: 1;
            min-width: 0;
        }
        
        .npc-name {
            font-weight: bold;
            color: #ffd93d;
            margin-bottom: 5px;
            font-size: 14px;
        }
        
        .npc-text {
            font-size: 14px;
            line-height: 1.6;
            color: #ddd;
        }
        
        @media (max-width: 480px) {
            .npc-text {
                font-size: 13px;
            }
        }
    </style>
</head>
<body>
    <!-- 开始界面 -->
    <div id="startScreen" class="screen">
        <h1 class="start-title">翠翠养成记</h1>
        <img src="cuicui.jpg" alt="翠翠" class="start-avatar">
        <p class="start-subtitle">
            一个聋哑少年的传奇人生<br>
            从北大青鸟到数据标注，从诈骗到真爱<br>
            你能否帮助翠翠走完这波澜壮阔的一生？
        </p>
        <button class="start-btn" onclick="game.start()">开始人生</button>
    </div>
    
    <!-- 结束界面 -->
    <div id="endScreen" class="screen hidden">
        <div class="ending-card">
            <h2 id="endingTitle" class="ending-title"></h2>
            <p id="endingSummary" class="ending-summary"></p>
            <div class="final-stats" id="finalStats"></div>
            <div class="achievement-list" id="achievementList"></div>
            <button class="start-btn" onclick="game.restart()">重新开始</button>
        </div>
    </div>
    
    <!-- 成就弹窗 -->
    <div id="achievementPopup" class="achievement-popup">
        <div class="achievement-popup-title">🏆 解锁成就</div>
        <div class="achievement-popup-name" id="achievementName"></div>
    </div>
    
    <!-- 移动端手势提示 -->
    <div id="gestureHint" style="display: none; position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.8); padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 99; pointer-events: none;"></div>
    
    <!-- 游戏主界面 -->
    <div class="game-container" id="gameContainer" style="display: none;">
        <div class="header">
            <h1>翠翠养成记</h1>
            <div class="age-display">第 <span id="ageYear">1</span> 年 / <span id="ageMonth">1</span> 月</div>
        </div>
        
        <!-- 角色信息 -->
        <div class="character-card">
            <div class="avatar-container">
                <img src="cuicui.jpg" alt="翠翠" class="avatar">
                <span class="status-badge" id="statusBadge">婴儿</span>
            </div>
            <div class="character-info">
                <div class="character-name">翠翠</div>
                <div class="character-title" id="characterTitle">一个聋哑的孩子</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <span class="stat-icon">🧠</span>
                        <div class="stat-bar"><div class="stat-fill int" id="intBar" style="width: 10%"></div></div>
                        <span class="stat-value" id="intValue">10</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-icon">💪</span>
                        <div class="stat-bar"><div class="stat-fill str" id="strBar" style="width: 10%"></div></div>
                        <span class="stat-value" id="strValue">10</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-icon">💰</span>
                        <div class="stat-bar"><div class="stat-fill money" id="moneyBar" style="width: 5%"></div></div>
                        <span class="stat-value" id="moneyValue">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-icon">⚖️</span>
                        <div class="stat-bar"><div class="stat-fill moral" id="moralBar" style="width: 50%"></div></div>
                        <span class="stat-value" id="moralValue">50</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-icon">💻</span>
                        <div class="stat-bar"><div class="stat-fill code" id="codeBar" style="width: 0%"></div></div>
                        <span class="stat-value" id="codeValue">0</span>
                    </div>
                    <div class="stat-item">
                        <span class="stat-icon">🍀</span>
                        <div class="stat-bar"><div class="stat-fill luck" id="luckBar" style="width: 30%"></div></div>
                        <span class="stat-value" id="luckValue">30</span>
                    </div>
                </div>
            </div>
        </div>
        
        <!-- 主游戏区 -->
        <div class="main-area">
            <div id="npcDialog"></div>
            <div class="story-text" id="storyText">
                欢迎来到翠翠的世界...
            </div>
            <div class="choices-container" id="choicesContainer">
                <!-- 动态生成选项 -->
            </div>
        </div>
        
        <!-- 事件日志 -->
        <div class="event-log">
            <h3>📜 人生大事记</h3>
            <div id="logContainer">
                <!-- 动态生成日志 -->
            </div>
        </div>
    </div>

    <script>
        // ==================== 游戏数据 ====================
        const ACHIEVEMENTS = {
            BORN: { name: '来到人间', desc: '翠翠出生了' },
            PRIMARY: { name: '小学毕业', desc: '完成基础教育' },
            MIDDLE: { name: '初中生', desc: '进入青春期' },
            FAILED_EXAM: { name: '名落孙山', desc: '中考失利' },
            BEIDA: { name: '北大青鸟', desc: '开始IT学习之路' },
            TOKEN_MASTER: { name: 'Token贴大师', desc: '学会用Token贴学代码' },
            SCAMMER: { name: '第一桶金', desc: '通过诈骗赚到第一笔钱' },
            GRADUATE: { name: '毕业即失业', desc: '从北大青鸟毕业' },
            DATA_LABEL: { name: '标注员', desc: '成为数据标注员' },
            CHEAT_STUDENT: { name: '大学生之友', desc: '成功骗取大学生' },
            FIGHT_JIA: { name: '对抗嘉姐', desc: '与嘉姐正面对抗' },
            FIGHT_WAN: { name: '对抗万总', desc: '与万总正面对抗' },
            FAMILY_WAR: { name: '家族斗争', desc: '与二叔二婶周旋' },
            GRANDMA_CARE: { name: '孝子贤孙', desc: '让二叔二婶赡养奶奶' },
            MARRIED: { name: '喜结连理', desc: '与表妹结婚' },
            PEACEFUL_DEATH: { name: '寿终正寝', desc: '安详离世' }

        // ==================== 游戏主类 ====================
        class Game {
            constructor() {
                this.year = 0;
                this.month = 1;
                this.stats = {
                    int: 10,
                    str: 10,
                    money: 0,
                    moral: 50,
                    code: 0,
                    luck: 30
                };
                this.phase = 'BABY';
                this.unlockedAchievements = [];
                this.logs = [];
                this.currentEventIndex = 0;
                this.eventQueue = [];
                this.isProcessing = false;
                
                // 初始化移动端手势
                this.initTouchEvents();
            }
            
            initTouchEvents() {
                // 防止双击缩放
                let lastTouchEnd = 0;
                document.addEventListener('touchend', (e) => {
                    const now = Date.now();
                    if (now - lastTouchEnd <= 300) {
                        e.preventDefault();
                    }
                    lastTouchEnd = now;
                }, false);
                
                // 防止弹性滚动（iOS）
                document.body.addEventListener('touchmove', (e) => {
                    if (e.target.closest('.event-log')) return;
                }, { passive: true });
            }
            
            start() {
                document.getElementById('startScreen').classList.add('hidden');
                document.getElementById('gameContainer').style.display = 'block';
                this.unlockAchievement('BORN');
                this.nextEvent();
            }
            
            restart() {
                location.reload();
            }
            
            unlockAchievement(key) {
                if (this.unlockedAchievements.includes(key)) return;
                this.unlockedAchievements.push(key);
                
                const popup = document.getElementById('achievementPopup');
                document.getElementById('achievementName').textContent = ACHIEVEMENTS[key].name;
                popup.classList.add('show');
                setTimeout(() => popup.classList.remove('show'), 3000);
            }
            
            updateUI() {
                // 更新年龄
                document.getElementById('ageYear').textContent = this.year;
                document.getElementById('ageMonth').textContent = this.month;
                
                // 更新属性条
                const maxStat = 100;
                const updateBar = (id, value, max = maxStat) => {
                    const bar = document.getElementById(id + 'Bar');
                    const text = document.getElementById(id + 'Value');
                    const percent = Math.min((value / max) * 100, 100);
                    bar.style.width = percent + '%';
                    text.textContent = Math.floor(value);
                };
                
                updateBar('int', this.stats.int);
                updateBar('str', this.stats.str);
                updateBar('money', this.stats.money, 50000);
                updateBar('moral', this.stats.moral);
                updateBar('code', this.stats.code);
                updateBar('luck', this.stats.luck);
                
                // 更新状态标签
                const badge = document.getElementById('statusBadge');
                const title = document.getElementById('characterTitle');
                
                if (this.year < 3) {
                    badge.textContent = '婴儿';
                    title.textContent = '一个聋哑的孩子';
                } else if (this.year < 13) {
                    badge.textContent = '小学生';
                    title.textContent = '在聋哑学校学习';
                } else if (this.year < 16) {
                    badge.textContent = '初中生';
                    title.textContent = '面临中考压力';
                } else if (this.year < 19) {
                    badge.textContent = '青鸟学员';
                    title.textContent = '北大青鸟IT学员';
                } else if (this.year < 26) {
                    badge.textContent = '标注员';
                    title.textContent = '数据标注工作者';
                } else if (this.year < 30) {
                    badge.textContent = '丈夫';
                    title.textContent = '已婚人士';
                } else {
                    badge.textContent = '老人';
                    title.textContent = '安享晚年';
                }
            }
            
            addLog(text, type = 'normal') {
                const container = document.getElementById('logContainer');
                const item = document.createElement('div');
                item.className = 'log-item';
                
                const time = document.createElement('span');
                time.className = 'log-time';
                time.textContent = `${this.year}岁${this.month}月`;
                
                const content = document.createElement('span');
                content.className = 'log-content ' + type;
                content.textContent = text;
                
                item.appendChild(time);
                item.appendChild(content);
                container.insertBefore(item, container.firstChild);
                
                this.logs.push({ year: this.year, month: this.month, text, type });
            }
            
            determinePhase() {
                if (this.year < 3) return 'BABY';
                if (this.year < 13) return 'CHILDHOOD';
                if (this.year < 16) return 'TEEN';
                if (this.year < 19) return 'STUDY';
                if (this.year < 26) return 'WORK_LABEL';
                if (this.year < 28) return 'FAMILY';
                if (this.year < 32) return 'MARRIAGE';
                return 'OLD_AGE';
            }
            
            nextEvent() {
                this.phase = this.determinePhase();
                
                // 根据阶段获取事件
                const phaseEvents = EVENTS[this.phase];
                if (!phaseEvents || this.currentEventIndex >= phaseEvents.length) {
                    // 阶段事件用完，推进时间
                    this.advanceTime();
                    return;
                }
                
                const event = phaseEvents[this.currentEventIndex];
                this.showEvent(event);
                this.currentEventIndex++;
            }
            
            showEvent(event) {
                this.isProcessing = false;
                document.getElementById('storyText').textContent = event.text;
                
                const container = document.getElementById('choicesContainer');
                container.innerHTML = '';
                
                event.choices.forEach((choice, index) => {
                    const btn = document.createElement('button');
                    btn.className = 'choice-btn';
                    if (choice.effect.moral > 0) btn.classList.add('positive');
                    if (choice.effect.moral < 0) btn.classList.add('negative');
                    btn.textContent = choice.text;
                    
                    // 同时支持点击和触摸
                    const handleSelect = (e) => {
                        e.preventDefault();
                        if (this.isProcessing) return;
                        this.isProcessing = true;
                        this.makeChoice(choice, index, event);
                    };
                    
                    btn.addEventListener('click', handleSelect);
                    btn.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        handleSelect(e);
                    });
                    
                    container.appendChild(btn);
                });
                
                // 滚动到故事顶部
                if (window.innerWidth <= 480) {
                    document.querySelector('.main-area').scrollIntoView({ 
                        behavior: 'smooth', 
                        block: 'start' 
                    });
                }
                
                this.updateUI();
            }
            
            makeChoice(choice, index, event) {
                // 应用效果
                if (choice.effect) {
                    for (let key in choice.effect) {
                        if (this.stats[key] !== undefined) {
                            this.stats[key] += choice.effect[key];
                        }
                    }
                }
                
                // 调用事件回调
                if (event.onSelect) {
                    event.onSelect(index);
                }
                
                // 添加日志
                let logType = 'normal';
                if (choice.effect.money > 0) logType = 'money';
                else if (choice.effect.moral > 0) logType = 'good';
                else if (choice.effect.moral < 0) logType = 'bad';
                this.addLog(choice.text, logType);
                
                // 检查结局
                if (choice.ending) {
                    this.showEnding();
                    return;
                }
                
                // 推进时间
                this.advanceTime();
            }
            
            advanceTime() {
                this.month += Math.floor(Math.random() * 6) + 3;
                if (this.month > 12) {
                    this.month = 1;
                    this.year++;
                    this.currentEventIndex = 0; // 新年重置事件索引
                    
                    // 特殊年龄成就
                    if (this.year === 6) this.unlockAchievement('PRIMARY');
                    if (this.year === 13) this.unlockAchievement('MIDDLE');
                }
                
                this.updateUI();
                this.nextEvent();
            }
            
            showEnding() {
                const endScreen = document.getElementById('endScreen');
                endScreen.classList.remove('hidden');
                
                // 移动端滚动到顶部
                if (window.innerWidth <= 480) {
                    endScreen.scrollTop = 0;
                    window.scrollTo(0, 0);
                }
                
                // 计算结局类型
                let endingType = 'neutral';
                let endingTitle = '';
                let endingSummary = '';
                
                if (this.stats.moral >= 70 && this.stats.money >= 20000) {
                    endingType = 'good';
                    endingTitle = '功德圆满';
                    endingSummary = '翠翠虽然出身聋哑，但凭借自己的努力和善良，最终获得了幸福和财富。他用Token贴学习编程，在北大青鸟掌握了技能，虽然曾走过弯路，但最终回归正途。他与表妹的婚姻虽然不被世俗理解，但两人相濡以沫，白头偕老。';
                } else if (this.stats.moral <= 30) {
                    endingType = 'bad';
                    endingTitle = '罪有应得';
                    endingSummary = '翠翠一生走捷径，靠诈骗和坑蒙拐骗度日。虽然短期获得了金钱，但良心难安。最终孤独离世，无人送终。他的人生是一个警示：莫伸手，伸手必被捉。';
                } else {
                    endingType = 'neutral';
                    endingTitle = '平凡一生';
                    endingSummary = '翠翠的人生并不轰轰烈烈，但也不算失败。作为聋哑人，他努力生活，虽然有些小瑕疵，但总体是个好人。他经历了北大青鸟的学习、数据标注的枯燥、家庭的纷争，最终与表妹结婚，寿终正寝。这样的一生，也算圆满。';
                }
                
                const titleEl = document.getElementById('endingTitle');
                titleEl.className = 'ending-title ' + endingType;
                titleEl.textContent = endingTitle;
                
                document.getElementById('endingSummary').textContent = endingSummary;
                
                // 最终属性
                const statsHtml = `
                    <div class="final-stat-item">
                        <span>🧠 智力</span>
                        <span>${Math.floor(this.stats.int)}</span>
                    </div>
                    <div class="final-stat-item">
                        <span>💪 体力</span>
                        <span>${Math.floor(this.stats.str)}</span>
                    </div>
                    <div class="final-stat-item">
                        <span>💰 财富</span>
                        <span>¥${Math.floor(this.stats.money)}</span>
                    </div>
                    <div class="final-stat-item">
                        <span>⚖️ 道德</span>
                        <span>${Math.floor(this.stats.moral)}</span>
                    </div>
                    <div class="final-stat-item">
                        <span>💻 编程</span>
                        <span>${Math.floor(this.stats.code)}</span>
                    </div>
                    <div class="final-stat-item">
                        <span>🍀 运气</span>
                        <span>${Math.floor(this.stats.luck)}</span>
                    </div>
                `;
                document.getElementById('finalStats').innerHTML = statsHtml;
                
                // 成就列表
                const achievementsHtml = this.unlockedAchievements.map(key => 
                    `<span class="achievement">${ACHIEVEMENTS[key].name}</span>`
                ).join('');
                document.getElementById('achievementList').innerHTML = achievementsHtml;
            }
        }
        
        const game = new Game();
    </script>
