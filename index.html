<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>翠翠</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            touch-action: manipulation;
        }
        
        html, body {
            touch-action: pan-x pan-y;
            -webkit-text-size-adjust: 100%;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #1e3c72 0%, #2a5298 50%, #1e3c72 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
            -webkit-tap-highlight-color: transparent;
        }
        
        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        .level-info {
            font-size: 24px;
            color: #2a5298;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        .progress {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }
        
        /* 角色容器 */
        .character {
            position: relative;
            width: 200px;
            height: 380px;
            margin: 0 auto 30px;
        }
        
        /* 头部 - 可点击 */
        .head {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #fdbf60;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border: 3px solid #e0a040;
            z-index: 10;
            cursor: pointer;
            transition: transform 0.1s;
            user-select: none;
        }
        
        .head:active {
            transform: scale(0.95);
        }
        
        .head.clicked {
            animation: headShake 0.2s ease-in-out;
        }
        
        @keyframes headShake {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.1) rotate(-5deg); }
            75% { transform: scale(1.1) rotate(5deg); }
        }
        
        .head img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            pointer-events: none;
        }
        
        .head-hint {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff6b6b;
            color: white;
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            white-space: nowrap;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
        }
        
        .head-hint.show {
            opacity: 1;
        }
        
        .head-hint::after {
            content: '';
            position: absolute;
            bottom: -8px;
            left: 50%;
            transform: translateX(-50%);
            border-left: 8px solid transparent;
            border-right: 8px solid transparent;
            border-top: 8px solid #ff6b6b;
        }
        
        .click-float {
            position: absolute;
            color: #ff6b6b;
            font-size: 20px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.8s ease-out forwards;
            z-index: 100;
        }
        
        @keyframes floatUp {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-50px) scale(1.2);
            }
        }
        
        /* 身体 */
        .body {
            width: 100px;
            height: 120px;
            background: #4a90e2;
            margin: -10px auto 0;
            border-radius: 20px 20px 0 0;
            position: relative;
            z-index: 5;
        }
        
        /* 手臂 - 初始位置 */
        .arm-left, .arm-right {
            position: absolute;
            width: 26px;
            height: 95px;
            background: #fdbf60;
            border-radius: 13px;
            top: 130px;
            border: 2px solid #e0a040;
            z-index: 20;
            transform-origin: top center;
        }
        
        .arm-left {
            left: 28px;
            transform: rotate(-15deg);
        }
        
        .arm-right {
            right: 28px;
            transform: rotate(15deg);
        }
        
        /* 脱裤子后 - 两只手都握住阴茎并套弄 */
        .character.undressed .arm-left {
            animation: fapLeft 0.12s ease-in-out infinite alternate;
        }
        
        .character.undressed .arm-right {
            animation: fapRight 0.12s ease-in-out infinite alternate;
        }
        
        /* 左手套弄动画 - 握住根部 */
        @keyframes fapLeft {
            0% {
                transform: rotate(-35deg) translate(8px, 15px);
            }
            100% {
                transform: rotate(-25deg) translate(8px, -15px);
            }
        }
        
        /* 右手套弄动画 - 握住中部，比左手快一点点 */
        @keyframes fapRight {
            0% {
                transform: rotate(-50deg) translate(0px, 20px);
            }
            100% {
                transform: rotate(-40deg) translate(0px, -25px);
            }
        }
        
        /* 手部 */
        .hand {
            position: absolute;
            width: 32px;
            height: 38px;
            background: #fdbf60;
            border-radius: 50%;
            bottom: -18px;
            left: 50%;
            transform: translateX(-50%);
            border: 2px solid #e0a040;
        }
        
        /* 腿部容器 */
        .legs {
            position: relative;
            width: 100px;
            height: 130px;
            margin: 0 auto;
        }
        
        /* 腿 */
        .leg-left, .leg-right {
            position: absolute;
            width: 40px;
            height: 130px;
            background: #fdbf60;
            border-radius: 0 0 15px 15px;
            bottom: 0;
            border: 2px solid #e0a040;
            border-top: none;
        }
        
        .leg-left {
            left: 5px;
        }
        
        .leg-right {
            right: 5px;
        }
        
        /* 裤子 */
        .pants {
            position: absolute;
            width: 100px;
            height: 90px;
            background: #2c3e50;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 0 0 10px 10px;
            z-index: 8;
            transition: opacity 0.5s;
            border: 2px solid #1a252f;
        }
        
        .pants::before, .pants::after {
            content: '';
            position: absolute;
            width: 45px;
            height: 50px;
            background: #2c3e50;
            bottom: -40px;
            border: 2px solid #1a252f;
            border-top: none;
        }
        
        .pants::before {
            left: 0;
            border-radius: 0 0 0 10px;
        }
        
        .pants::after {
            right: 0;
            border-radius: 0 0 10px 0;
        }
        
        .pants.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        /* 阴茎容器 */
        .penis-container {
            position: absolute;
            bottom: 110px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 25; /* 比手高，确保头部露出来 */
        }
        
        /* 阴茎 */
        .penis {
            width: 30px;
            height: 0;
            background: linear-gradient(to top, #e8b4b4, #f5c8c8);
            border-radius: 15px 15px 50% 50%;
            transition: height 0.5s;
            overflow: visible;
            position: relative;
            transform: rotate(-30deg);
            transform-origin: bottom center;
            border: 2px solid #d4a0a0;
        }
        
        .penis.show {
            height: 75px;
        }
        
        /* 龟头 - 确保露出来 */
        .penis-head {
            position: absolute;
            width: 38px;
            height: 28px;
            background: linear-gradient(to top, #d4a0a0, #f0c0c0);
            border-radius: 50%;
            top: -14px;
            left: 50%;
            transform: translateX(-50%);
            border: 2px solid #c08080;
            z-index: 30; /* 最高层级 */
        }
        
        /* 尿道口 */
        .urethra {
            position: absolute;
            width: 5px;
            height: 5px;
            background: #804040;
            border-radius: 50%;
            top: 4px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 35;
        }
        
        /* 阴囊 */
        .scrotum {
            position: absolute;
            width: 45px;
            height: 25px;
            background: #e8b4b4;
            border-radius: 50%;
            bottom: -12px;
            left: 50%;
            transform: translateX(-50%);
            border: 2px solid #d4a0a0;
            opacity: 0;
            transition: opacity 0.5s;
            z-index: 15;
        }
        
        .penis.show + .scrotum {
            opacity: 1;
        }
        
        /* 白色液体 */
        .sperm-pool {
            position: fixed;
            background: radial-gradient(ellipse at 30% 30%, 
                rgba(255,255,255,0.95) 0%, 
                rgba(255,255,255,0.8) 30%, 
                rgba(240,240,240,0.6) 70%, 
                transparent 100%);
            border-radius: 50% 40% 60% 50%;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 0 10px rgba(255,255,255,0.5);
        }
        
        @keyframes squirtPool {
            0% {
                opacity: 0.9;
                transform: scale(0.3);
            }
            20% {
                opacity: 1;
                transform: scale(1);
            }
            60% {
                opacity: 0.8;
                transform: scale(1.2);
            }
            100% {
                opacity: 0;
                transform: scale(1.5);
            }
        }
        
        .sperm-pool.animating {
            animation: squirtPool 1.2s ease-out forwards;
        }
        
        .sperm-drop {
            position: fixed;
            background: radial-gradient(ellipse at 30% 20%, white, #f0f0f0);
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0;
            pointer-events: none;
            z-index: 999;
        }
        
        @keyframes dropFall {
            0% {
                opacity: 1;
                transform: translateY(0) scaleX(0.8) scaleY(1);
            }
            50% {
                transform: translateY(30px) scaleX(1) scaleY(0.9);
            }
            100% {
                opacity: 0;
                transform: translateY(80px) scaleX(1.5) scaleY(0.3);
            }
        }
        
        .sperm-drop.animating {
            animation: dropFall 0.8s ease-in forwards;
        }
        
        /* 按钮区域 - 默认隐藏 */
        .buttons {
            display: none;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        .buttons.show {
            display: flex;
            animation: fadeIn 0.5s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.05s;
            font-weight: bold;
            outline: none;
            -webkit-touch-callout: none;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
            position: relative;
            z-index: 50;
        }
        
        button:active {
            transform: scale(0.95);
        }
        
        .btn-undress {
            background: #e74c3c;
            color: white;
        }
        
        .btn-undress:hover:not(:disabled) {
            background: #c0392b;
        }
        
        .btn-undress:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        
        .btn-fap {
            background: #9b59b6;
            color: white;
        }
        
        .btn-fap:hover:not(:disabled) {
            background: #8e44ad;
        }
        
        .btn-fap:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        
        .btn-next {
            background: #27ae60;
            color: white;
            margin-top: 20px;
        }
        
        .btn-next:hover {
            background: #229954;
        }
        
        /* 消息提示 */
        .message {
            font-size: 20px;
            color: #e74c3c;
            min-height: 30px;
            margin-top: 10px;
        }
        
        .message.success {
            color: #27ae60;
            font-size: 24px;
            font-weight: bold;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* 解锁提示 */
        .unlock-message {
            font-size: 22px;
            color: #ff6b6b;
            font-weight: bold;
            margin-bottom: 20px;
            animation: bounce 0.5s ease-out;
        }
        
        @keyframes bounce {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }
        
        /* 胜利覆盖层 */
        .victory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 200;
        }
        
        .victory-overlay.show {
            display: flex;
        }
        
        .victory-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.5s;
            max-width: 90%;
        }
        
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .victory-content h2 {
            color: #27ae60;
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        .victory-content p {
            font-size: 24px;
            color: #666;
            margin-bottom: 10px;
        }
        
        .victory-content .thanks {
            font-size: 28px;
            color: #e74c3c;
            margin-top: 20px;
        }
        
        /* 点击计数显示 */
        .click-counter {
            font-size: 16px;
            color: #9b59b6;
            margin-bottom: 10px;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>🎮 翠翠大冒险</h1>
    
    <div class="game-container">
        <div class="level-info">第 <span id="level">1</span> 关</div>
        <div class="progress">
            进度: <span id="current">0</span> / <span id="target">20</span> 下
        </div>
        <div class="click-counter" id="clickCounter" style="display: none;">
            本关点击: <span id="clickCountDisplay">0</span> 次
        </div>
        
        <div class="character" id="character">
            <div class="head" id="head">
                <div class="head-hint" id="headHint">点击头部解锁彩蛋！</div>
                <img src="cuicui.jpg" alt="翠翠">
            </div>
            <div class="body"></div>
            <div class="arm-left" id="armLeft">
                <div class="hand"></div>
            </div>
            <div class="arm-right" id="armRight">
                <div class="hand"></div>
            </div>
            <div class="legs">
                <div class="leg-left"></div>
                <div class="leg-right"></div>
                <div class="penis-container">
                    <div class="penis" id="penis">
                        <div class="penis-head">
                            <div class="urethra"></div>
                        </div>
                    </div>
                    <div class="scrotum"></div>
                </div>
                <div class="pants" id="pants"></div>
            </div>
        </div>
        
        <div id="unlockContainer"></div>
        
        <div class="buttons" id="buttonsArea">
            <button class="btn-undress" id="btnUndress">脱裤子</button>
            <button class="btn-fap" id="btnFap" disabled>打飞机</button>
        </div>
        
        <div class="message" id="message"></div>
    </div>
    
    <div class="victory-overlay" id="victoryOverlay">
        <div class="victory-content">
            <h2>🎉 恭喜过关！</h2>
            <p>翠翠舒服了~</p>
            <p class="thanks">谢谢！</p>
            <button class="btn-next" id="btnNext">进入第 <span id="nextLevelNum">2</span> 关</button>
        </div>
    </div>

    <script>
        // 游戏状态
        let level = 1;
        let currentCount = 0;
        let targetCount = 20;
        let isUndressed = false;
        let isCompleted = false;
        let isUnlocked = false;
        let headClickCount = 0;
        let actualClickCount = 0; // 实际点击次数
        const UNLOCK_THRESHOLD = 10;
        
        // DOM元素
        const head = document.getElementById('head');
        const headHint = document.getElementById('headHint');
        const buttonsArea = document.getElementById('buttonsArea');
        const unlockContainer = document.getElementById('unlockContainer');
        const clickCounter = document.getElementById('clickCounter');
        const clickCountDisplay = document.getElementById('clickCountDisplay');
        const btnUndress = document.getElementById('btnUndress');
        const btnFap = document.getElementById('btnFap');
        const btnNext = document.getElementById('btnNext');
        const character = document.getElementById('character');
        const pants = document.getElementById('pants');
        const penis = document.getElementById('penis');
        const message = document.getElementById('message');
        const victoryOverlay = document.getElementById('victoryOverlay');
        
        // 更新UI
        function updateUI() {
            document.getElementById('level').textContent = level;
            document.getElementById('current').textContent = currentCount;
            document.getElementById('target').textContent = targetCount;
            document.getElementById('nextLevelNum').textContent = level + 1;
            clickCountDisplay.textContent = actualClickCount;
        }
        
        // 显示点击数字
        function showClickNumber(x, y, count) {
            const float = document.createElement('div');
            float.className = 'click-float';
            float.textContent = count;
            float.style.left = x + 'px';
            float.style.top = y + 'px';
            document.body.appendChild(float);
            
            setTimeout(() => {
                float.remove();
            }, 800);
        }
        
        // 点击头部
        function clickHead(e) {
            if (isUnlocked) return;
            
            headClickCount++;
            
            head.classList.add('clicked');
            setTimeout(() => {
                head.classList.remove('clicked');
            }, 200);
            
            const rect = head.getBoundingClientRect();
            showClickNumber(
                rect.left + rect.width / 2 + (Math.random() - 0.5) * 40,
                rect.top,
                headClickCount
            );
            
            if (headClickCount >= UNLOCK_THRESHOLD) {
                unlockButtons();
            } else {
                headHint.textContent = `再点击 ${UNLOCK_THRESHOLD - headClickCount} 次解锁！`;
                headHint.classList.add('show');
                setTimeout(() => {
                    headHint.classList.remove('show');
                }, 1500);
            }
        }
        
        // 解锁按钮
        function unlockButtons() {
            isUnlocked = true;
            headHint.style.display = 'none';
            
            const unlockMsg = document.createElement('div');
            unlockMsg.className = 'unlock-message';
            unlockMsg.textContent = '🎉 解锁彩蛋！';
            unlockContainer.appendChild(unlockMsg);
            
            buttonsArea.classList.add('show');
            clickCounter.style.display = 'block';
            
            setTimeout(() => {
                unlockMsg.remove();
            }, 3000);
        }
        
        // 脱裤子
        function undress() {
            if (isUndressed) return;
            
            isUndressed = true;
            pants.classList.add('hidden');
            
            setTimeout(() => {
                penis.classList.add('show');
            }, 300);
            
            character.classList.add('undressed');
            
            btnUndress.disabled = true;
            btnUndress.textContent = '已脱裤子';
            btnFap.disabled = false;
            message.textContent = '';
        }
        
        // 打飞机 - 使用 pointerdown 确保每次点击都计数
        function fap(e) {
            e.preventDefault();
            e.stopPropagation();
            
            if (!isUndressed) {
                message.textContent = '请先脱裤子！';
                return;
            }
            
            if (isCompleted) return;
            
            // 每次点击都增加
            actualClickCount++;
            currentCount++;
            updateUI();
            
            // 视觉反馈
            btnFap.style.transform = 'scale(0.95)';
            setTimeout(() => {
                btnFap.style.transform = '';
            }, 50);
            
            if (currentCount >= targetCount) {
                completeLevel();
            }
        }
        
        // 获取尿道口位置
        function getUrethraPosition() {
            const urethra = document.querySelector('.urethra');
            const rect = urethra.getBoundingClientRect();
            return {
                x: rect.left + rect.width / 2,
                y: rect.top + rect.height / 2
            };
        }
        
        // 一滩一滩的喷射效果
        function ejaculate() {
            const pos = getUrethraPosition();
            
            let poolCount = 0;
            const poolInterval = setInterval(() => {
                createPool(pos.x, pos.y);
                poolCount++;
                if (poolCount >= 15) {
                    clearInterval(poolInterval);
                }
            }, 80);
            
            setTimeout(() => {
                let poolCount2 = 0;
                const poolInterval2 = setInterval(() => {
                    createPool(pos.x, pos.y);
                    poolCount2++;
                    if (poolCount2 >= 12) {
                        clearInterval(poolInterval2);
                    }
                }, 100);
            }, 1500);
            
            setTimeout(() => {
                let poolCount3 = 0;
                const poolInterval3 = setInterval(() => {
                    createPool(pos.x, pos.y);
                    poolCount3++;
                    if (poolCount3 >= 10) {
                        clearInterval(poolInterval3);
                    }
                }, 120);
            }, 2800);
            
            setTimeout(() => {
                for (let i = 0; i < 8; i++) {
                    setTimeout(() => {
                        createDrop(pos.x, pos.y);
                    }, i * 200);
                }
            }, 3500);
        }
        
        // 创建一滩液体
        function createPool(x, y) {
            const pool = document.createElement('div');
            pool.className = 'sperm-pool';
            
            const width = 25 + Math.random() * 35;
            const height = 15 + Math.random() * 25;
            pool.style.width = width + 'px';
            pool.style.height = height + 'px';
            
            pool.style.left = (x - width/2) + 'px';
            pool.style.top = (y - height/2) + 'px';
            
            const angle = (Math.random() - 0.5) * Math.PI * 0.8 - Math.PI / 2;
            const distance = 30 + Math.random() * 80;
            const tx = Math.cos(angle) * distance;
            const ty = Math.sin(angle) * distance;
            
            pool.style.transform = `translate(${tx}px, ${ty}px)`;
            
            document.body.appendChild(pool);
            
            setTimeout(() => {
                pool.classList.add('animating');
            }, 10);
            
            setTimeout(() => {
                pool.remove();
            }, 1500);
        }
        
        // 创建滴落液体
        function createDrop(x, y) {
            const drop = document.createElement('div');
            drop.className = 'sperm-drop';
            
            const size = 8 + Math.random() * 12;
            drop.style.width = size + 'px';
            drop.style.height = size * 1.5 + 'px';
            drop.style.left = (x - size/2) + 'px';
            drop.style.top = (y - size/2) + 'px';
            
            document.body.appendChild(drop);
            
            setTimeout(() => {
                drop.classList.add('animating');
            }, 10);
            
            setTimeout(() => {
                drop.remove();
            }, 1000);
        }
        
        // 完成关卡
        function completeLevel() {
            isCompleted = true;
            btnFap.disabled = true;
            
            character.classList.remove('undressed');
            
            ejaculate();
            
            setTimeout(() => {
                message.textContent = '翠翠舒服了！谢谢！';
                message.classList.add('success');
                victoryOverlay.classList.add('show');
            }, 3000);
        }
        
        // 下一关
        function nextLevel() {
            level++;
            targetCount = 20 + (level - 1) * 10;
            currentCount = 0;
            actualClickCount = 0;
            isUndressed = false;
            isCompleted = false;
            
            pants.classList.remove('hidden');
            penis.classList.remove('show');
            character.classList.remove('undressed');
            btnUndress.disabled = false;
            btnUndress.textContent = '脱裤子';
            btnFap.disabled = false;
            message.textContent = '';
            message.classList.remove('success');
            victoryOverlay.classList.remove('show');
            
            updateUI();
        }
        
        // 绑定事件 - 使用 pointerdown 确保快速点击不漏
        head.addEventListener('pointerdown', clickHead);
        btnUndress.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            undress();
        });
        btnFap.addEventListener('pointerdown', fap);
        btnNext.addEventListener('pointerdown', function(e) {
            e.preventDefault();
            nextLevel();
        });
        
        // 阻止双击缩放
        let lastTouchEnd = 0;
        document.addEventListener('touchend', function (event) {
            const now = Date.now();
            if (now - lastTouchEnd <= 300) {
                event.preventDefault();
            }
            lastTouchEnd = now;
        }, false);
        
        // 初始化
        updateUI();
    </script>
</body>
</html>
