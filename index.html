<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>翠翠大冒险</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        h1 {
            color: white;
            margin-bottom: 20px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }
        
        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
        }
        
        .level-info {
            font-size: 24px;
            color: #764ba2;
            margin-bottom: 20px;
            font-weight: bold;
        }
        
        .progress {
            font-size: 18px;
            color: #666;
            margin-bottom: 20px;
        }
        
        /* 角色容器 */
        .character {
            position: relative;
            width: 200px;
            height: 350px;
            margin: 0 auto 30px;
        }
        
        /* 头部 */
        .head {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #fdbf60;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            border: 3px solid #e0a040;
            z-index: 10;
        }
        
        .head img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        /* 身体 */
        .body {
            width: 100px;
            height: 120px;
            background: #4a90e2;
            margin: -10px auto 0;
            border-radius: 20px 20px 0 0;
            position: relative;
            z-index: 5;
        }
        
        /* 手臂 */
        .arm-left, .arm-right {
            position: absolute;
            width: 30px;
            height: 100px;
            background: #fdbf60;
            border-radius: 15px;
            top: 130px;
            transition: transform 0.3s;
        }
        
        .arm-left {
            left: 20px;
            transform-origin: top center;
        }
        
        .arm-right {
            right: 20px;
            transform-origin: top center;
        }
        
        /* 打飞机动画 */
        .character.fapping .arm-right {
            animation: fap 0.3s ease-in-out;
        }
        
        @keyframes fap {
            0% { transform: rotate(0deg) translateX(0); }
            50% { transform: rotate(-30deg) translateX(-20px); }
            100% { transform: rotate(0deg) translateX(0); }
        }
        
        /* 腿部容器 */
        .legs {
            position: relative;
            width: 100px;
            height: 120px;
            margin: 0 auto;
        }
        
        /* 腿 */
        .leg-left, .leg-right {
            position: absolute;
            width: 40px;
            height: 120px;
            background: #fdbf60;
            border-radius: 0 0 10px 10px;
            bottom: 0;
        }
        
        .leg-left {
            left: 5px;
        }
        
        .leg-right {
            right: 5px;
        }
        
        /* 裤子 */
        .pants {
            position: absolute;
            width: 100px;
            height: 80px;
            background: #2c3e50;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 0 0 10px 10px;
            z-index: 8;
            transition: opacity 0.5s;
        }
        
        .pants::before, .pants::after {
            content: '';
            position: absolute;
            width: 45px;
            height: 45px;
            background: #2c3e50;
            bottom: -35px;
        }
        
        .pants::before {
            left: 0;
            border-radius: 0 0 0 10px;
        }
        
        .pants::after {
            right: 0;
            border-radius: 0 0 10px 0;
        }
        
        .pants.hidden {
            opacity: 0;
            pointer-events: none;
        }
        
        /* 阴茎 */
        .penis {
            position: absolute;
            width: 30px;
            height: 0;
            background: #e8b4b4;
            border-radius: 15px 15px 50% 50%;
            bottom: 60px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 6;
            transition: height 0.5s;
            overflow: hidden;
        }
        
        .penis.show {
            height: 60px;
        }
        
        /* 龟头 */
        .penis::after {
            content: '';
            position: absolute;
            width: 32px;
            height: 20px;
            background: #d4a0a0;
            border-radius: 50%;
            top: -5px;
            left: 50%;
            transform: translateX(-50%);
        }
        
        /* 白色液体 */
        .sperm {
            position: absolute;
            width: 8px;
            height: 8px;
            background: white;
            border-radius: 50%;
            opacity: 0;
            pointer-events: none;
        }
        
        @keyframes ejaculate {
            0% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
            100% {
                opacity: 0;
                transform: translateY(-150px) scale(0.5);
            }
        }
        
        .sperm.animating {
            animation: ejaculate 1s ease-out forwards;
        }
        
        /* 按钮 */
        .buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 20px;
        }
        
        button {
            padding: 15px 30px;
            font-size: 18px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s;
            font-weight: bold;
        }
        
        .btn-undress {
            background: #e74c3c;
            color: white;
        }
        
        .btn-undress:hover {
            background: #c0392b;
            transform: scale(1.05);
        }
        
        .btn-undress:disabled {
            background: #95a5a6;
            cursor: not-allowed;
            transform: none;
        }
        
        .btn-fap {
            background: #9b59b6;
            color: white;
        }
        
        .btn-fap:hover:not(:disabled) {
            background: #8e44ad;
            transform: scale(1.05);
        }
        
        .btn-fap:disabled {
            background: #95a5a6;
            cursor: not-allowed;
        }
        
        .btn-next {
            background: #27ae60;
            color: white;
        }
        
        .btn-next:hover {
            background: #229954;
            transform: scale(1.05);
        }
        
        /* 消息提示 */
        .message {
            font-size: 20px;
            color: #e74c3c;
            min-height: 30px;
            margin-top: 10px;
        }
        
        .message.success {
            color: #27ae60;
            font-size: 24px;
            font-weight: bold;
            animation: pulse 1s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }
        
        /* 胜利覆盖层 */
        .victory-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }
        
        .victory-overlay.show {
            display: flex;
        }
        
        .victory-content {
            background: white;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            animation: popIn 0.5s;
        }
        
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            80% { transform: scale(1.1); opacity: 1; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        .victory-content h2 {
            color: #27ae60;
            font-size: 36px;
            margin-bottom: 20px;
        }
        
        .victory-content p {
            font-size: 20px;
            color: #666;
            margin-bottom: 30px;
        }
    </style>
</head>
<body>
    <h1>🎮 翠翠大冒险</h1>
    
    <div class="game-container">
        <div class="level-info">第 <span id="level">1</span> 关</div>
        <div class="progress">
            进度: <span id="current">0</span> / <span id="target">20</span> 下
        </div>
        
        <div class="character" id="character">
            <div class="head">
                <img src="cuicui.jpg" alt="翠翠">
            </div>
            <div class="body"></div>
            <div class="arm-left"></div>
            <div class="arm-right"></div>
            <div class="legs">
                <div class="leg-left"></div>
                <div class="leg-right"></div>
                <div class="penis" id="penis"></div>
                <div class="pants" id="pants"></div>
            </div>
        </div>
        
        <div class="buttons">
            <button class="btn-undress" id="btnUndress" onclick="undress()">脱裤子</button>
            <button class="btn-fap" id="btnFap" onclick="fap()" disabled>打飞机</button>
        </div>
        
        <div class="message" id="message"></div>
    </div>
    
    <!-- 胜利弹窗 -->
    <div class="victory-overlay" id="victoryOverlay">
        <div class="victory-content">
            <h2>🎉 恭喜过关！</h2>
            <p>翠翠舒服了~</p>
            <button class="btn-next" onclick="nextLevel()">进入第 <span id="nextLevelNum">2</span> 关</button>
        </div>
    </div>

    <script>
        // 游戏状态
        let level = 1;
        let currentCount = 0;
        let targetCount = 20;
        let isUndressed = false;
        let isCompleted = false;
        
        // 更新UI
        function updateUI() {
            document.getElementById('level').textContent = level;
            document.getElementById('current').textContent = currentCount;
            document.getElementById('target').textContent = targetCount;
            document.getElementById('nextLevelNum').textContent = level + 1;
        }
        
        // 脱裤子
        function undress() {
            if (isUndressed) return;
            
            isUndressed = true;
            document.getElementById('pants').classList.add('hidden');
            setTimeout(() => {
                document.getElementById('penis').classList.add('show');
            }, 300);
            
            document.getElementById('btnUndress').disabled = true;
            document.getElementById('btnUndress').textContent = '已脱裤子';
            document.getElementById('btnFap').disabled = false;
            document.getElementById('message').textContent = '';
        }
        
        // 打飞机
        function fap() {
            if (!isUndressed) {
                document.getElementById('message').textContent = '请先脱裤子！';
                return;
            }
            
            if (isCompleted) return;
            
            // 播放手臂动画
            const character = document.getElementById('character');
            character.classList.add('fapping');
            setTimeout(() => {
                character.classList.remove('fapping');
            }, 300);
            
            currentCount++;
            updateUI();
            
            // 检查是否完成
            if (currentCount >= targetCount) {
                completeLevel();
            }
        }
        
        // 喷射效果
        function ejaculate() {
            const penis = document.getElementById('penis');
            const rect = penis.getBoundingClientRect();
            
            // 创建多个精子粒子
            for (let i = 0; i < 15; i++) {
                setTimeout(() => {
                    const sperm = document.createElement('div');
                    sperm.className = 'sperm';
                    sperm.style.left = rect.left + rect.width / 2 + (Math.random() - 0.5) * 20 + 'px';
                    sperm.style.top = rect.top + 'px';
                    sperm.style.transform = `translateX(${(Math.random() - 0.5) * 50}px)`;
                    document.body.appendChild(sperm);
                    
                    setTimeout(() => {
                        sperm.classList.add('animating');
                    }, 10);
                    
                    setTimeout(() => {
                        sperm.remove();
                    }, 1000);
                }, i * 50);
            }
        }
        
        // 完成关卡
        function completeLevel() {
            isCompleted = true;
            document.getElementById('btnFap').disabled = true;
            document.getElementById('message').textContent = '翠翠舒服了！';
            document.getElementById('message').classList.add('success');
            
            // 播放喷射效果
            ejaculate();
            
            // 显示胜利弹窗
            setTimeout(() => {
                document.getElementById('victoryOverlay').classList.add('show');
            }, 1000);
        }
        
        // 下一关
        function nextLevel() {
            level++;
            targetCount = 20 + (level - 1) * 10; // 每关增加10下
            currentCount = 0;
            isUndressed = false;
            isCompleted = false;
            
            // 重置UI
            document.getElementById('pants').classList.remove('hidden');
            document.getElementById('penis').classList.remove('show');
            document.getElementById('btnUndress').disabled = false;
            document.getElementById('btnUndress').textContent = '脱裤子';
            document.getElementById('btnFap').disabled = true;
            document.getElementById('message').textContent = '';
            document.getElementById('message').classList.remove('success');
            document.getElementById('victoryOverlay').classList.remove('show');
            
            updateUI();
        }
        
        // 初始化
        updateUI();
    </script>
</body>
</html>
