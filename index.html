<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <title>翠斗罗 - CUI CONTRA</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }
        
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
        }
        
        body {
            font-family: 'Courier New', monospace;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #gameContainer {
            position: relative;
            width: 100%;
            height: 100%;
            max-width: 960px;
            max-height: 540px;
            background: #000;
        }
        
        #gameCanvas {
            width: 100%;
            height: 100%;
            image-rendering: pixelated;
            image-rendering: -moz-crisp-edges;
            image-rendering: crisp-edges;
        }
        
        /* UI层 */
        #uiLayer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
        }
        
        /* HUD */
        .hud {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            pointer-events: none;
        }
        
        .hud-left {
            display: flex;
            gap: 20px;
            align-items: center;
        }
        
        .player-avatar {
            width: 50px;
            height: 50px;
            border: 3px solid #ff0000;
            background: #000;
            overflow: hidden;
        }
        
        .player-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .score-section {
            color: #fff;
        }
        
        .score-label {
            font-size: 12px;
            color: #ffff00;
            text-shadow: 2px 2px 0 #000;
        }
        
        .score-value {
            font-size: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }
        
        .lives-section {
            display: flex;
            align-items: center;
            gap: 5px;
            color: #ff0000;
            font-size: 18px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }
        
        .life-icon {
            width: 20px;
            height: 25px;
            background: linear-gradient(to bottom, #ff0000 0%, #cc0000 50%, #990000 100%);
            clip-path: polygon(20% 0%, 80% 0%, 100% 50%, 50% 100%, 0% 50%);
        }
        
        .weapon-icon {
            color: #00ff00;
            font-size: 16px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #000;
        }
        
        /* 开始/结束屏幕 */
        .screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(180deg, #1a0a2e 0%, #0a0a1a 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            pointer-events: auto;
            z-index: 100;
        }
        
        .screen.hidden {
            display: none;
        }
        
        .game-title {
            font-size: 72px;
            font-weight: bold;
            background: linear-gradient(180deg, #ff0000 0%, #cc0000 50%, #990000 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.8);
            letter-spacing: 10px;
            margin-bottom: 10px;
            animation: titlePulse 1.5s ease-in-out infinite;
        }
        
        @keyframes titlePulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }
        
        .game-subtitle {
            font-size: 24px;
            color: #ffff00;
            letter-spacing: 15px;
            margin-bottom: 40px;
            text-shadow: 0 0 20px rgba(255, 255, 0, 0.8);
        }
        
        .start-screen-avatar {
            width: 150px;
            height: 150px;
            border: 5px solid #ff0000;
            margin-bottom: 30px;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.6);
        }
        
        .start-screen-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .blink-text {
            font-size: 20px;
            color: #fff;
            animation: blink 1s step-end infinite;
        }
        
        @keyframes blink {
            0%, 50% { opacity: 1; }
            51%, 100% { opacity: 0; }
        }
        
        .start-btn {
            padding: 15px 50px;
            font-size: 24px;
            background: linear-gradient(180deg, #ff0000 0%, #cc0000 100%);
            border: 4px solid #ffff00;
            color: #fff;
            cursor: pointer;
            font-family: 'Courier New', monospace;
            font-weight: bold;
            text-transform: uppercase;
            box-shadow: 0 0 20px rgba(255, 0, 0, 0.6);
        }
        
        .start-btn:active {
            transform: scale(0.95);
        }
        
        /* 移动端控制 */
        .mobile-controls {
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 160px;
            display: none;
            pointer-events: none;
            padding: 0 20px 20px;
        }
        
        @media (max-width: 768px) {
            .mobile-controls {
                display: flex;
                justify-content: space-between;
                align-items: flex-end;
            }
        }
        
        .d-pad {
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }
        
        .d-btn {
            width: 60px;
            height: 60px;
            background: rgba(255, 255, 255, 0.15);
            border: 3px solid rgba(255, 255, 255, 0.5);
            border-radius: 10px;
            color: #fff;
            font-size: 24px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
        }
        
        .d-btn:active {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .action-buttons {
            display: flex;
            gap: 15px;
            pointer-events: auto;
        }
        
        .action-btn {
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 14px;
            font-weight: bold;
            color: #fff;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            user-select: none;
            text-transform: uppercase;
        }
        
        .btn-shoot {
            background: rgba(255, 0, 0, 0.5);
            border: 4px solid #ff0000;
            box-shadow: 0 0 15px rgba(255, 0, 0, 0.5);
        }
        
        .btn-jump {
            background: rgba(0, 100, 255, 0.5);
            border: 4px solid #0064ff;
            box-shadow: 0 0 15px rgba(0, 100, 255, 0.5);
        }
        
        .action-btn:active {
            transform: scale(0.9);
        }
        
        /* 游戏结束 */
        .game-over-title {
            font-size: 48px;
            color: #ff0000;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
            margin-bottom: 20px;
        }
        
        .final-score {
            font-size: 24px;
            color: #fff;
            margin-bottom: 30px;
        }
        
        .final-score span {
            color: #ffff00;
            font-size: 32px;
        }
        
        /* 关卡完成 */
        .stage-clear {
            font-size: 36px;
            color: #00ff00;
            text-shadow: 0 0 20px rgba(0, 255, 0, 0.8);
            margin-bottom: 20px;
        }
        
        /* Boss血条 */
        .boss-hp-container {
            position: absolute;
            top: 70px;
            left: 50%;
            transform: translateX(-50%);
            width: 300px;
            display: none;
        }
        
        .boss-hp-container.show {
            display: block;
        }
        
        .boss-name {
            text-align: center;
            color: #ff0000;
            font-size: 14px;
            margin-bottom: 5px;
            text-shadow: 2px 2px 0 #000;
        }
        
        .boss-hp-bar {
            height: 20px;
            background: #000;
            border: 3px solid #fff;
            position: relative;
        }
        
        .boss-hp-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff0000, #ff6600);
            transition: width 0.2s;
        }
        
        /* 操作说明 */
        .controls-hint {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255, 255, 255, 0.5);
            font-size: 14px;
            text-align: center;
        }
        
        @media (max-width: 768px) {
            .controls-hint {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas"></canvas>
        
        <div id="uiLayer">
            <div class="hud" id="hud">
                <div class="hud-left">
                    <div class="player-avatar">
                        <img src="cuicui.jpg" alt="翠翠">
                    </div>
                    <div class="score-section">
                        <div class="score-label">1P</div>
                        <div class="score-value" id="scoreValue">000000</div>
                    </div>
                </div>
                <div class="hud-right">
                    <div class="weapon-icon" id="weaponIcon">N</div>
                    <div class="lives-section">
                        <div class="life-icon"></div>
                        <span id="livesValue">×3</span>
                    </div>
                </div>
            </div>
            
            <div class="boss-hp-container" id="bossHpContainer">
                <div class="boss-name" id="bossName">BOSS</div>
                <div class="boss-hp-bar">
                    <div class="boss-hp-fill" id="bossHpFill" style="width: 100%"></div>
                </div>
            </div>
        </div>
        
        <!-- 移动端控制 -->
        <div class="mobile-controls">
            <div class="d-pad">
                <div class="d-btn" id="btnLeft">←</div>
                <div class="d-btn" id="btnRight">→</div>
                <div class="d-btn" id="btnUp">↑</div>
                <div class="d-btn" id="btnDown">↓</div>
            </div>
            <div class="action-buttons">
                <div class="action-btn btn-shoot" id="btnShoot">SHOOT</div>
                <div class="action-btn btn-jump" id="btnJump">JUMP</div>
            </div>
        </div>
        
        <!-- 开始屏幕 -->
        <div id="startScreen" class="screen">
            <h1 class="game-title">翠斗罗</h1>
            <p class="game-subtitle">CUI CONTRA</p>
            <div class="start-screen-avatar">
                <img src="cuicui.jpg" alt="翠翠">
            </div>
            <button class="start-btn" id="startBtn">START</button>
            <div class="controls-hint">
                ← → 移动 | ↑ ↓ 上下梯子 | Z 射击 | X 跳跃
            </div>
        </div>
        
        <!-- 游戏结束屏幕 -->
        <div id="gameOverScreen" class="screen hidden">
            <h2 class="game-over-title">GAME OVER</h2>
            <p class="final-score">SCORE: <span id="finalScore">0</span></p>
            <button class="start-btn" id="restartBtn">CONTINUE</button>
        </div>
        
        <!-- 关卡完成屏幕 -->
        <div id="stageClearScreen" class="screen hidden">
            <h2 class="stage-clear">STAGE CLEAR!</h2>
            <p class="final-score">SCORE: <span id="stageScore">0</span></p>
            <button class="start-btn" id="nextStageBtn">NEXT STAGE</button>
        </div>
    </div>

    <script>
        // ==================== 游戏配置 ====================
        const CONFIG = {
            GRAVITY: 0.6,
            JUMP_FORCE: -12,
            MOVE_SPEED: 4,
            BULLET_SPEED: 10,
            ENEMY_BULLET_SPEED: 5,
            INVINCIBLE_TIME: 120,
            CAMERA_SMOOTH: 0.1
        };
        
        // ==================== 输入管理 ====================
        class InputManager {
            constructor() {
                this.keys = {};
                this.initKeyboard();
                this.initTouch();
            }
            
            initKeyboard() {
                window.addEventListener('keydown', (e) => {
                    this.keys[e.key.toLowerCase()] = true;
                    // 防止页面滚动
                    if (['arrowup', 'arrowdown', 'arrowleft', 'arrowright', ' '].includes(e.key.toLowerCase())) {
                        e.preventDefault();
                    }
                });
                
                window.addEventListener('keyup', (e) => {
                    this.keys[e.key.toLowerCase()] = false;
                });
            }
            
            initTouch() {
                const bindTouch = (id, key) => {
                    const btn = document.getElementById(id);
                    if (!btn) return;
                    
                    btn.addEventListener('touchstart', (e) => {
                        e.preventDefault();
                        this.keys[key] = true;
                    });
                    
                    btn.addEventListener('touchend', (e) => {
                        e.preventDefault();
                        this.keys[key] = false;
                    });
                    
                    btn.addEventListener('mousedown', () => this.keys[key] = true);
                    btn.addEventListener('mouseup', () => this.keys[key] = false);
                    btn.addEventListener('mouseleave', () => this.keys[key] = false);
                };
                
                bindTouch('btnLeft', 'arrowleft');
                bindTouch('btnRight', 'arrowright');
                bindTouch('btnUp', 'arrowup');
                bindTouch('btnDown', 'arrowdown');
                bindTouch('btnShoot', 'z');
                bindTouch('btnJump', 'x');
            }
            
            isPressed(key) {
                return !!this.keys[key.toLowerCase()];
            }
        }
        
        // ==================== 游戏实体 ====================
        class Entity {
            constructor(x, y, width, height) {
                this.x = x;
                this.y = y;
                this.width = width;
                this.height = height;
                this.vx = 0;
                this.vy = 0;
                this.dead = false;
            }
            
            getBounds() {
                return { x: this.x, y: this.y, width: this.width, height: this.height };
            }
            
            intersects(other) {
                const a = this.getBounds();
                const b = other.getBounds();
                return a.x < b.x + b.width &&
                       a.x + a.width > b.x &&
                       a.y < b.y + b.height &&
                       a.y + a.height > b.y;
            }
            
            update() {}
            draw(ctx) {}
        }
        
        // ==================== 玩家 ====================
        class Player extends Entity {
            constructor(x, y, avatar) {
                super(x, y, 30, 50);
                this.avatar = avatar;
                this.facing = 1; // 1右 -1左
                this.onGround = false;
                this.invincible = 0;
                this.shootCooldown = 0;
                this.weapon = 'N'; // N普通 S霰弹 L激光 M机枪
            }
            
            update(input, platforms) {
                // 移动
                if (input.isPressed('arrowleft')) {
                    this.vx = -CONFIG.MOVE_SPEED;
                    this.facing = -1;
                } else if (input.isPressed('arrowright')) {
                    this.vx = CONFIG.MOVE_SPEED;
                    this.facing = 1;
                } else {
                    this.vx = 0;
                }
                
                // 跳跃
                if (input.isPressed('x') && this.onGround) {
                    this.vy = CONFIG.JUMP_FORCE;
                    this.onGround = false;
                }
                
                // 重力
                this.vy += CONFIG.GRAVITY;
                
                // 应用速度
                this.x += this.vx;
                this.y += this.vy;
                
                // 平台碰撞
                this.onGround = false;
                for (const platform of platforms) {
                    if (this.intersects(platform)) {
                        // 从上方落下
                        if (this.vy > 0 && this.y - this.vy + this.height <= platform.y + 10) {
                            this.y = platform.y - this.height;
                            this.vy = 0;
                            this.onGround = true;
                        }
                        // 从下方跳上
                        else if (this.vy < 0 && this.y - this.vy >= platform.y + platform.height - 10) {
                            this.y = platform.y + platform.height;
                            this.vy = 0;
                        }
                        // 左右碰撞
                        else if (this.vx > 0) {
                            this.x = platform.x - this.width;
                        } else if (this.vx < 0) {
                            this.x = platform.x + platform.width;
                        }
                    }
                }
                
                // 边界
                if (this.x < 0) this.x = 0;
                if (this.y > 1000) this.dead = true; // 掉出地图
                
                // 射击
                if (this.shootCooldown > 0) this.shootCooldown--;
                if (input.isPressed('z') && this.shootCooldown <= 0) {
                    this.shoot();
                }
                
                // 无敌时间
                if (this.invincible > 0) this.invincible--;
            }
            
            shoot() {
                this.shootCooldown = 10;
                const bullets = [];
                
                switch(this.weapon) {
                    case 'S': // 霰弹
                        bullets.push(new Bullet(this.x + this.width/2, this.y + 20, this.facing * CONFIG.BULLET_SPEED, 0, true));
                        bullets.push(new Bullet(this.x + this.width/2, this.y + 20, this.facing * CONFIG.BULLET_SPEED, -2, true));
                        bullets.push(new Bullet(this.x + this.width/2, this.y + 20, this.facing * CONFIG.BULLET_SPEED, 2, true));
                        bullets.push(new Bullet(this.x + this.width/2, this.y + 20, this.facing * CONFIG.BULLET_SPEED, -4, true));
                        bullets.push(new Bullet(this.x + this.width/2, this.y + 20, this.facing * CONFIG.BULLET_SPEED, 4, true));
                        break;
                    case 'L': // 激光
                        bullets.push(new Bullet(this.x + this.width/2, this.y + 20, this.facing * CONFIG.BULLET_SPEED * 1.5, 0, true, 'laser'));
                        break;
                    case 'M': // 机枪
                        bullets.push(new Bullet(this.x + this.width/2, this.y + 20, this.facing * CONFIG.BULLET_SPEED, (Math.random()-0.5)*2, true));
                        this.shootCooldown = 5;
                        break;
                    default: // 普通
                        bullets.push(new Bullet(this.x + this.width/2, this.y + 20, this.facing * CONFIG.BULLET_SPEED, 0, true));
                }
                
                return bullets;
            }
            
            takeDamage() {
                if (this.invincible > 0) return false;
                this.invincible = CONFIG.INVINCIBLE_TIME;
                return true;
            }
            
            draw(ctx) {
                // 无敌闪烁
                if (this.invincible > 0 && Math.floor(this.invincible / 4) % 2 === 0) return;
                
                ctx.save();
                
                // 绘制角色（简化为魂斗罗风格的人物形状，头像作为头部）
                if (this.avatar && this.avatar.complete) {
                    // 头像
                    const headSize = 25;
                    ctx.save();
                    ctx.translate(this.x + this.width/2, this.y + 15);
                    if (this.facing === -1) {
                        ctx.scale(-1, 1);
                    }
                    ctx.drawImage(this.avatar, -headSize/2, -headSize/2, headSize, headSize);
                    ctx.restore();
                }
                
                // 身体（魂斗罗风格）
                ctx.fillStyle = '#ff0000'; // 红色裤子
                ctx.fillRect(this.x + 5, this.y + 30, 20, 20);
                
                ctx.fillStyle = '#0066cc'; // 蓝色上衣
                ctx.fillRect(this.x + 5, this.y + 20, 20, 15);
                
                // 枪
                ctx.fillStyle = '#888';
                const gunX = this.facing === 1 ? this.x + 25 : this.x - 5;
                ctx.fillRect(gunX, this.y + 25, 10, 5);
                
                ctx.restore();
            }
        }
        
        // ==================== 子弹 ====================
        class Bullet extends Entity {
            constructor(x, y, vx, vy, isPlayer = false, type = 'normal') {
                super(x, y, type === 'laser' ? 30 : 8, 4);
                this.vx = vx;
                this.vy = vy;
                this.isPlayer = isPlayer;
                this.type = type;
                this.life = 60;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.life--;
                if (this.life <= 0) this.dead = true;
            }
            
            draw(ctx) {
                ctx.fillStyle = this.isPlayer ? '#ffff00' : '#ff0000';
                if (this.type === 'laser') {
                    ctx.fillRect(this.x, this.y, 30, 4);
                } else {
                    ctx.fillRect(this.x, this.y, 8, 4);
                    // 子弹光晕
                    ctx.fillStyle = this.isPlayer ? 'rgba(255,255,0,0.5)' : 'rgba(255,0,0,0.5)';
                    ctx.fillRect(this.x-2, this.y-2, 12, 8);
                }
            }
        }
        
        // ==================== 平台 ====================
        class Platform extends Entity {
            constructor(x, y, width, height, type = 'normal') {
                super(x, y, width, height);
                this.type = type;
            }
            
            draw(ctx, cameraX) {
                const screenX = this.x - cameraX;
                
                // 平台主体
                if (this.type === 'ground') {
                    ctx.fillStyle = '#4a3020';
                    ctx.fillRect(screenX, this.y, this.width, this.height);
                    // 草地
                    ctx.fillStyle = '#228b22';
                    ctx.fillRect(screenX, this.y, this.width, 10);
                } else {
                    ctx.fillStyle = '#8b4513';
                    ctx.fillRect(screenX, this.y, this.width, this.height);
                    // 平台边框
                    ctx.strokeStyle = '#654321';
                    ctx.lineWidth = 2;
                    ctx.strokeRect(screenX, this.y, this.width, this.height);
                }
            }
        }
        
        // ==================== 敌人 ====================
        class Enemy extends Entity {
            constructor(x, y, type = 'soldier') {
                super(x, y, 30, 50);
                this.type = type;
                this.hp = type === 'soldier' ? 1 : 3;
                this.facing = -1;
                this.moveTimer = 0;
                this.shootTimer = 0;
            }
            
            update(player, platforms) {
                this.moveTimer++;
                this.shootTimer++;
                
                // 简单AI：向玩家方向移动
                const dx = player.x - this.x;
                const dy = player.y - this.y;
                
                if (Math.abs(dx) < 300) {
                    if (dx > 30) {
                        this.vx = 1.5;
                        this.facing = 1;
                    } else if (dx < -30) {
                        this.vx = -1.5;
                        this.facing = -1;
                    } else {
                        this.vx = 0;
                    }
                    
                    this.x += this.vx;
                }
                
                // 重力
                this.vy += CONFIG.GRAVITY;
                this.y += this.vy;
                
                // 平台碰撞
                for (const platform of platforms) {
                    if (this.intersects(platform)) {
                        if (this.vy > 0) {
                            this.y = platform.y - this.height;
                            this.vy = 0;
                        }
                    }
                }
                
                // 射击
                if (this.shootTimer > 120 && Math.abs(dx) < 250 && Math.abs(dy) < 50) {
                    this.shootTimer = 0;
                    return new Bullet(this.x + this.width/2, this.y + 20, this.facing * CONFIG.ENEMY_BULLET_SPEED, 0, false);
                }
                
                return null;
            }
            
            takeDamage() {
                this.hp--;
                if (this.hp <= 0) {
                    this.dead = true;
                    return true;
                }
                return false;
            }
            
            draw(ctx, cameraX) {
                const screenX = this.x - cameraX;
                
                // 敌人（魂斗罗风格士兵）
                ctx.fillStyle = this.type === 'soldier' ? '#8b0000' : '#4a0080';
                ctx.fillRect(screenX + 5, this.y + 30, 20, 20);
                
                ctx.fillStyle = '#ff6600';
                ctx.fillRect(screenX + 5, this.y + 20, 20, 15);
                
                // 头盔
                ctx.fillStyle = '#444';
                ctx.fillRect(screenX + 5, this.y + 5, 20, 15);
                
                // 枪
                ctx.fillStyle = '#888';
                const gunX = this.facing === 1 ? screenX + 25 : screenX - 5;
                ctx.fillRect(gunX, this.y + 25, 10, 5);
            }
        }
        
        // ==================== BOSS ====================
        class Boss extends Enemy {
            constructor(x, y) {
                super(x, y, 'boss');
                this.width = 80;
                this.height = 100;
                this.maxHp = 50;
                this.hp = this.maxHp;
                this.phase = 0;
                this.movePattern = 0;
            }
            
            update(player, platforms) {
                this.movePattern++;
                
                // BOSS移动模式
                this.x += Math.sin(this.movePattern * 0.02) * 2;
                this.y = 300 + Math.sin(this.movePattern * 0.03) * 50;
                
                // 发射子弹
                const bullets = [];
                if (this.movePattern % 60 === 0) {
                    bullets.push(new Bullet(this.x, this.y + 50, -5, 0, false));
                    bullets.push(new Bullet(this.x, this.y + 50, -4, -2, false));
                    bullets.push(new Bullet(this.x, this.y + 50, -4, 2, false));
                }
                
                return bullets;
            }
            
            draw(ctx, cameraX) {
                const screenX = this.x - cameraX;
                
                // BOSS身体
                ctx.fillStyle = '#800080';
                ctx.fillRect(screenX, this.y, this.width, this.height);
                
                // BOSS核心
                ctx.fillStyle = `hsl(${this.movePattern % 360}, 100%, 50%)`;
                ctx.fillRect(screenX + 20, this.y + 20, 40, 40);
                
                // 炮管
                ctx.fillStyle = '#444';
                ctx.fillRect(screenX - 20, this.y + 45, 20, 10);
                
                // 翠翠的头作为BOSS脸
                if (game.avatar && game.avatar.complete) {
                    ctx.save();
                    ctx.translate(screenX + this.width/2, this.y + 30);
                    ctx.drawImage(game.avatar, -20, -20, 40, 40);
                    ctx.restore();
                }
            }
        }
        
        // ==================== 道具 ====================
        class PowerUp extends Entity {
            constructor(x, y, type) {
                super(x, y, 30, 30);
                this.type = type; // 'S'霰弹 'L'激光 'M'机枪 'R'生命
                this.bobOffset = 0;
            }
            
            update() {
                this.bobOffset += 0.1;
            }
            
            draw(ctx, cameraX) {
                const screenX = this.x - cameraX;
                const y = this.y + Math.sin(this.bobOffset) * 5;
                
                // 道具背景
                ctx.fillStyle = '#444';
                ctx.fillRect(screenX, y, 30, 30);
                
                // 道具图标
                ctx.fillStyle = '#fff';
                ctx.font = 'bold 20px monospace';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';
                
                let text = this.type;
                let color = '#fff';
                switch(this.type) {
                    case 'S': color = '#ff6600'; break;
                    case 'L': color = '#00ffff'; break;
                    case 'M': color = '#ff00ff'; break;
                    case 'R': color = '#ff0000'; text = '♥'; break;
                }
                ctx.fillStyle = color;
                ctx.fillText(text, screenX + 15, y + 15);
                
                // 光晕效果
                ctx.strokeStyle = color;
                ctx.lineWidth = 2;
                ctx.strokeRect(screenX - 2, y - 2, 34, 34);
            }
        }
        
        // ==================== 粒子效果 ====================
        class Particle extends Entity {
            constructor(x, y, color) {
                super(x, y, 4, 4);
                this.vx = (Math.random() - 0.5) * 8;
                this.vy = (Math.random() - 0.5) * 8;
                this.color = color;
                this.life = 30;
            }
            
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += 0.3;
                this.life--;
                if (this.life <= 0) this.dead = true;
            }
            
            draw(ctx, cameraX) {
                const screenX = this.x - cameraX;
                ctx.fillStyle = this.color;
                ctx.globalAlpha = this.life / 30;
                ctx.fillRect(screenX, this.y, this.width, this.height);
                ctx.globalAlpha = 1;
            }
        }
        
        // ==================== 游戏主类 ====================
        class ContraGame {
            constructor() {
                this.canvas = document.getElementById('gameCanvas');
                this.ctx = this.canvas.getContext('2d');
                this.input = new InputManager();
                
                this.setupCanvas();
                
                // 加载翠翠头像
                this.avatar = new Image();
                this.avatar.src = 'cuicui.jpg';
                
                this.reset();
                this.bindUI();
            }
            
            setupCanvas() {
                const resize = () => {
                    const container = document.getElementById('gameContainer');
                    const aspectRatio = 16 / 9;
                    let width = container.clientWidth;
                    let height = container.clientHeight;
                    
                    if (width / height > aspectRatio) {
                        width = height * aspectRatio;
                    } else {
                        height = width / aspectRatio;
                    }
                    
                    this.canvas.width = 960;
                    this.canvas.height = 540;
                    this.canvas.style.width = width + 'px';
                    this.canvas.style.height = height + 'px';
                };
                
                resize();
                window.addEventListener('resize', resize);
            }
            
            reset() {
                this.score = 0;
                this.lives = 3;
                this.stage = 1;
                this.isRunning = false;
                this.isPaused = false;
                this.cameraX = 0;
                
                this.player = null;
                this.platforms = [];
                this.enemies = [];
                this.bullets = [];
                this.powerUps = [];
                this.particles = [];
                this.boss = null;
            }
            
            bindUI() {
                document.getElementById('startBtn').addEventListener('click', () => this.start());
                document.getElementById('restartBtn').addEventListener('click', () => this.restart());
                document.getElementById('nextStageBtn').addEventListener('click', () => this.nextStage());
            }
            
            start() {
                document.getElementById('startScreen').classList.add('hidden');
                this.initStage();
                this.isRunning = true;
                this.loop();
            }
            
            restart() {
                document.getElementById('gameOverScreen').classList.add('hidden');
                this.lives = 3;
                this.score = 0;
                this.stage = 1;
                this.initStage();
                this.isRunning = true;
                this.loop();
            }
            
            nextStage() {
                document.getElementById('stageClearScreen').classList.add('hidden');
                this.stage++;
                this.initStage();
                this.isRunning = true;
                this.loop();
            }
            
            initStage() {
                this.player = new Player(100, 300, this.avatar);
                this.bullets = [];
                this.enemies = [];
                this.powerUps = [];
                this.particles = [];
                this.boss = null;
                this.cameraX = 0;
                
                this.generateStage();
                this.updateUI();
            }
            
            generateStage() {
                this.platforms = [];
                
                // 地面
                for (let i = 0; i < 50; i++) {
                    this.platforms.push(new Platform(i * 100, 450, 100, 90, 'ground'));
                }
                
                // 平台
                const platformLayouts = [
                    { x: 300, y: 350, w: 100 },
                    { x: 500, y: 300, w: 80 },
                    { x: 700, y: 350, w: 100 },
                    { x: 900, y: 280, w: 80 },
                    { x: 1200, y: 350, w: 100 },
                    { x: 1500, y: 300, w: 80 },
                    { x: 1800, y: 350, w: 100 },
                    { x: 2100, y: 280, w: 80 },
                    { x: 2400, y: 350, w: 100 },
                    { x: 2800, y: 300, w: 150 },
                    { x: 3200, y: 350, w: 100 },
                    { x: 3500, y: 280, w: 80 },
                    { x: 3800, y: 350, w: 200 },
                ];
                
                platformLayouts.forEach(p => {
                    this.platforms.push(new Platform(p.x, p.y, p.w, 20, 'platform'));
                });
                
                // 生成敌人
                const enemyPositions = [
                    { x: 400, y: 400 }, { x: 800, y: 400 },
                    { x: 1200, y: 400 }, { x: 1600, y: 400 },
                    { x: 2000, y: 400 }, { x: 2500, y: 400 },
                    { x: 3000, y: 400 }, { x: 3500, y: 400 },
                    { x: 600, y: 400 }, { x: 1400, y: 400 },
                    { x: 2200, y: 400 }, { x: 3300, y: 400 },
                ];
                
                enemyPositions.forEach(pos => {
                    this.enemies.push(new Enemy(pos.x, pos.y));
                });
                
                // 道具
                this.powerUps.push(new PowerUp(550, 250, 'S'));
                this.powerUps.push(new PowerUp(1300, 300, 'L'));
                this.powerUps.push(new PowerUp(2200, 300, 'M'));
                this.powerUps.push(new PowerUp(2900, 250, 'R'));
                
                // BOSS（第3关）
                if (this.stage >= 3) {
                    this.boss = new Boss(4000, 300);
                }
            }
            
            update() {
                if (!this.isRunning || this.isPaused) return;
                
                // 更新玩家
                this.player.update(this.input, this.platforms);
                
                // 玩家射击
                if (this.input.isPressed('z')) {
                    const newBullets = this.player.shoot();
                    if (newBullets) {
                        this.bullets.push(...newBullets);
                    }
                }
                
                // 更新相机
                const targetCamX = this.player.x - 200;
                this.cameraX += (targetCamX - this.cameraX) * CONFIG.CAMERA_SMOOTH;
                if (this.cameraX < 0) this.cameraX = 0;
                if (this.cameraX > 4000) this.cameraX = 4000;
                
                // 更新子弹
                this.bullets.forEach(b => b.update());
                this.bullets = this.bullets.filter(b => !b.dead);
                
                // 更新敌人
                this.enemies.forEach(e => {
                    const bullet = e.update(this.player, this.platforms);
                    if (bullet) this.bullets.push(bullet);
                });
                this.enemies = this.enemies.filter(e => !e.dead);
                
                // 更新BOSS
                if (this.boss) {
                    const bossBullets = this.boss.update(this.player, this.platforms);
                    if (bossBullets) this.bullets.push(...bossBullets);
                    
                    // 更新BOSS血条
                    const bossHpFill = document.getElementById('bossHpFill');
                    const bossHpContainer = document.getElementById('bossHpContainer');
                    bossHpContainer.classList.add('show');
                    bossHpFill.style.width = (this.boss.hp / this.boss.maxHp * 100) + '%';
                    
                    if (this.boss.dead) {
                        this.stageClear();
                    }
                } else {
                    document.getElementById('bossHpContainer').classList.remove('show');
                }
                
                // 更新道具
                this.powerUps.forEach(p => p.update());
                this.powerUps = this.powerUps.filter(p => !p.dead);
                
                // 更新粒子
                this.particles.forEach(p => p.update());
                this.particles = this.particles.filter(p => !p.dead);
                
                // 碰撞检测
                this.checkCollisions();
                
                // 检查玩家死亡
                if (this.player.dead) {
                    this.playerDied();
                }
                
                // 生成新敌人（简单刷怪）
                if (Math.random() < 0.01 && this.enemies.length < 20 && !this.boss) {
                    const spawnX = this.cameraX + 800 + Math.random() * 200;
                    this.enemies.push(new Enemy(spawnX, 400));
                }
            }
            
            checkCollisions() {
                // 玩家子弹打敌人
                this.bullets.forEach(b => {
                    if (!b.isPlayer) return;
                    
                    this.enemies.forEach(e => {
                        if (b.intersects(e)) {
                            b.dead = true;
                            if (e.takeDamage()) {
                                this.score += 100;
                                this.createExplosion(e.x + e.width/2, e.y + e.height/2, '#ff6600');
                            }
                        }
                    });
                    
                    // 打BOSS
                    if (this.boss && b.intersects(this.boss)) {
                        b.dead = true;
                        this.boss.hp--;
                        if (this.boss.hp <= 0) {
                            this.boss.dead = true;
                            this.score += 5000;
                            this.createExplosion(this.boss.x + 40, this.boss.y + 50, '#ff00ff');
                        }
                    }
                });
                
                // 敌人子弹打玩家
                this.bullets.forEach(b => {
                    if (b.isPlayer) return;
                    if (b.intersects(this.player)) {
                        b.dead = true;
                        if (this.player.takeDamage()) {
                            this.createExplosion(this.player.x + 15, this.player.y + 25, '#ff0000');
                        }
                    }
                });
                
                // 玩家碰敌人
                this.enemies.forEach(e => {
                    if (this.player.intersects(e)) {
                        if (this.player.takeDamage()) {
                            this.createExplosion(this.player.x + 15, this.player.y + 25, '#ff0000');
                        }
                    }
                });
                
                // 捡道具
                this.powerUps.forEach(p => {
                    if (this.player.intersects(p)) {
                        p.dead = true;
                        if (p.type === 'R') {
                            this.lives++;
                            this.score += 500;
                        } else {
                            this.player.weapon = p.type;
                        }
                        this.createExplosion(p.x + 15, p.y + 15, '#ffff00');
                    }
                });
            }
            
            createExplosion(x, y, color) {
                for (let i = 0; i < 10; i++) {
                    this.particles.push(new Particle(x, y, color));
                }
            }
            
            playerDied() {
                this.lives--;
                this.updateUI();
                
                if (this.lives <= 0) {
                    this.gameOver();
                } else {
                    // 复活
                    this.player = new Player(this.cameraX + 100, 300, this.avatar);
                    this.player.weapon = 'N';
                }
            }
            
            stageClear() {
                this.isRunning = false;
                document.getElementById('stageScore').textContent = this.score;
                document.getElementById('stageClearScreen').classList.remove('hidden');
            }
            
            gameOver() {
                this.isRunning = false;
                document.getElementById('finalScore').textContent = this.score;
                document.getElementById('gameOverScreen').classList.remove('hidden');
            }
            
            updateUI() {
                document.getElementById('scoreValue').textContent = this.score.toString().padStart(6, '0');
                document.getElementById('livesValue').textContent = '×' + this.lives;
                document.getElementById('weaponIcon').textContent = this.player ? this.player.weapon : 'N';
            }
            
            draw() {
                // 清空画布
                this.ctx.fillStyle = '#000';
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制背景（天空渐变）
                const gradient = this.ctx.createLinearGradient(0, 0, 0, this.canvas.height);
                gradient.addColorStop(0, '#001a33');
                gradient.addColorStop(0.5, '#003d66');
                gradient.addColorStop(1, '#006699');
                this.ctx.fillStyle = gradient;
                this.ctx.fillRect(0, 0, this.canvas.width, this.canvas.height);
                
                // 绘制远景山脉（像素风格）
                this.ctx.fillStyle = '#002244';
                for (let i = 0; i < 20; i++) {
                    const x = (i * 100 - this.cameraX * 0.3) % 2000;
                    const h = 100 + Math.sin(i * 0.5) * 50;
                    this.ctx.fillRect(x, 450 - h, 100, h);
                }
                
                // 绘制平台
                this.platforms.forEach(p => {
                    if (p.x - this.cameraX > -200 && p.x - this.cameraX < this.canvas.width + 200) {
                        p.draw(this.ctx, this.cameraX);
                    }
                });
                
                // 绘制道具
                this.powerUps.forEach(p => {
                    if (p.x - this.cameraX > -100 && p.x - this.cameraX < this.canvas.width + 100) {
                        p.draw(this.ctx, this.cameraX);
                    }
                });
                
                // 绘制敌人
                this.enemies.forEach(e => {
                    if (e.x - this.cameraX > -100 && e.x - this.cameraX < this.canvas.width + 100) {
                        e.draw(this.ctx, this.cameraX);
                    }
                });
                
                // 绘制BOSS
                if (this.boss) {
                    this.boss.draw(this.ctx, this.cameraX);
                }
                
                // 绘制玩家
                if (this.player) {
                    this.player.draw(this.ctx);
                }
                
                // 绘制子弹
                this.bullets.forEach(b => b.draw(this.ctx, this.cameraX));
                
                // 绘制粒子
                this.particles.forEach(p => p.draw(this.ctx, this.cameraX));
                
                // 更新UI
                this.updateUI();
            }
            
            loop() {
                if (!this.isRunning) return;
                
                this.update();
                this.draw();
                
                requestAnimationFrame(() => this.loop());
            }
        }
        
        // 启动游戏
        const game = new ContraGame();
    </script>
